<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScraper - 通用网页数据提取工具</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-radius: 24px;
            --glass-bg-hover: rgba(255, 255, 255, 0.07);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-bg-focus: rgba(255, 255, 255, 0.1);
            --input-glow: 0 0 24px rgba(139, 92, 246, 0.35), 0 0 48px rgba(99, 102, 241, 0.15);
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --gradient-btn: linear-gradient(135deg, #7c3aed, #6366f1, #3b82f6);
            --text-primary: #f1f5f9;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.35);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            --bouncy: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body { margin: 0; padding: 0; min-height: 100vh; background: #050a1a; color: var(--text-primary); font-family: var(--font-ui); overflow-x: hidden; line-height: 1.6; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.25); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.45); }
        .bg-gradient { position: fixed; inset: 0; z-index: -3; background: linear-gradient(135deg, #050a1a, #0f172a, #1e1b4b, #172554, #0c4a6e, #1e1b4b, #0f172a, #050a1a); background-size: 600% 600%; animation: gradientShift 25s ease infinite; }
        @keyframes gradientShift { 0%{background-position:0% 50%}20%{background-position:30% 0%}40%{background-position:70% 30%}60%{background-position:100% 60%}80%{background-position:40% 90%}100%{background-position:0% 50%} }
        .bg-noise { position: fixed; inset: 0; z-index: -2; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 256px 256px; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: -1; animation: orbFloat ease-in-out infinite; will-change: transform; }
        .bg-orb:nth-child(2) { width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,0.3),transparent 70%);top:5%;left:10%;animation-duration:22s; }
        .bg-orb:nth-child(3) { width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.25),transparent 70%);top:50%;right:5%;animation-duration:28s;animation-delay:-8s; }
        .bg-orb:nth-child(4) { width:450px;height:450px;background:radial-gradient(circle,rgba(59,130,246,0.2),transparent 70%);bottom:5%;left:35%;animation-duration:24s;animation-delay:-12s; }
        .bg-orb:nth-child(5) { width:400px;height:400px;background:radial-gradient(circle,rgba(236,72,153,0.2),transparent 70%);top:25%;left:55%;animation-duration:30s;animation-delay:-6s; }
        .bg-orb:nth-child(6) { width:350px;height:350px;background:radial-gradient(circle,rgba(14,165,233,0.2),transparent 70%);top:70%;left:10%;animation-duration:26s;animation-delay:-3s; }
        .bg-orb:nth-child(7) { width:300px;height:300px;background:radial-gradient(circle,rgba(34,197,94,0.15),transparent 70%);top:10%;right:25%;animation-duration:20s;animation-delay:-15s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)}20%{transform:translate(40px,-60px) scale(1.08)}40%{transform:translate(-30px,30px) scale(0.92)}60%{transform:translate(20px,50px) scale(1.05)}80%{transform:translate(-40px,-20px) scale(0.97)} }
        .glass { background:var(--glass-bg);backdrop-filter:blur(32px) saturate(1.4) brightness(1.05);-webkit-backdrop-filter:blur(32px) saturate(1.4) brightness(1.05);border:1px solid var(--glass-border);border-radius:var(--glass-radius);box-shadow:0 8px 32px rgba(0,0,0,0.25),0 2px 8px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.1),inset 0 -1px 0 rgba(255,255,255,0.03);transition:all 0.4s var(--smooth);position:relative;overflow:hidden; }
        .glass::after { content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);pointer-events:none; }
        .glass:hover { border-color:rgba(139,92,246,0.15);box-shadow:0 12px 48px rgba(0,0,0,0.3),0 4px 12px rgba(139,92,246,0.08),inset 0 1px 0 rgba(255,255,255,0.12); }
        .glass-static { background:rgba(255,255,255,0.04);backdrop-filter:blur(32px) saturate(1.4) brightness(1.05);-webkit-backdrop-filter:blur(32px) saturate(1.4) brightness(1.05);border:1px solid var(--glass-border);border-radius:var(--glass-radius);box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1);position:relative;overflow:hidden; }
        .glass-static::after { content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);pointer-events:none; }
        .container { max-width:1200px;margin:0 auto;padding:24px 28px 120px;animation:pageEnter 0.8s var(--smooth) both; }
        .topbar { display:flex;align-items:center;justify-content:space-between;padding:20px 32px;margin-bottom:28px;animation:fadeInDown 0.6s var(--smooth) 0.1s both; }
        .topbar-logo h1 { font-size:1.8rem;font-weight:800;letter-spacing:-0.8px;background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 200%;animation:shimmerText 4s ease infinite; }
        .topbar-logo .subtitle { font-size:0.82rem;color:var(--text-muted);margin-top:4px;letter-spacing:0.3px; }
        .status-indicator { display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);padding:8px 16px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.06); }
        .status-dot { width:10px;height:10px;border-radius:50%;background:var(--error);transition:all 0.4s var(--smooth);box-shadow:0 0 0 3px rgba(239,68,68,0.15); }
        .status-dot.connected { background:var(--success);box-shadow:0 0 0 3px rgba(16,185,129,0.2),0 0 16px rgba(16,185,129,0.4);animation:pulseGlow 2.5s ease infinite; }
        @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,0.2),0 0 16px rgba(16,185,129,0.4)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0.1),0 0 24px rgba(16,185,129,0.2)} }
        .input-section { padding:32px;margin-bottom:24px;animation:fadeInUp 0.6s var(--smooth) 0.2s both; }
        .url-row { display:flex;gap:12px;margin-bottom:16px; }
        .url-input { background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px 20px;font-size:1rem;color:var(--text-primary);flex:1;transition:all 0.3s ease;outline:none;font-family:var(--font-ui); }
        .url-input:focus { border-color:rgba(139,92,246,0.5);box-shadow:0 0 0 4px rgba(139,92,246,0.12),0 0 32px rgba(139,92,246,0.15);background:rgba(255,255,255,0.08); }
        .url-input::placeholder { color:var(--text-muted); }
        .btn-primary { background:var(--gradient-btn);background-size:200% 200%;border:none;border-radius:16px;padding:16px 36px;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;transition:all 0.4s var(--smooth);box-shadow:0 4px 24px rgba(139,92,246,0.35),inset 0 1px 0 rgba(255,255,255,0.2);position:relative;overflow:hidden;white-space:nowrap;letter-spacing:0.3px;animation:gradientBtn 3s ease infinite; }
        @keyframes gradientBtn { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
        .btn-primary::before { content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.6s ease; }
        .btn-primary:hover::before { left:100%; }
        .btn-primary:hover { transform:translateY(-3px) scale(1.04);box-shadow:0 12px 40px rgba(139,92,246,0.5),inset 0 1px 0 rgba(255,255,255,0.25); }
        .btn-primary:active { transform:translateY(-1px) scale(0.97);box-shadow:0 2px 12px rgba(139,92,246,0.3); }
        .btn-primary:disabled { opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;background:linear-gradient(135deg,#4c1d95,#3730a3); }
        .btn-cancel { margin-top:14px;padding:10px 24px;font-size:0.9rem;font-family:var(--font-ui);color:var(--text-secondary);background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.25);border-radius:12px;cursor:pointer;transition:all 0.3s var(--smooth);backdrop-filter:blur(8px); }
        .btn-cancel:hover { background:rgba(239,68,68,0.3);color:#fff;border-color:rgba(239,68,68,0.5);box-shadow:0 4px 20px rgba(239,68,68,0.2);transform:translateY(-1px); }
        .mode-toggle { display:flex;gap:0; }
        .mode-toggle button { padding:8px 18px;font-size:0.82rem;font-family:var(--font-ui);color:var(--text-secondary);background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);cursor:pointer;transition:all 0.3s var(--smooth); }
        .mode-toggle button:first-child { border-radius:12px 0 0 12px;border-right:none; }
        .mode-toggle button:last-child { border-radius:0 12px 12px 0; }
        .mode-toggle button:hover { background:rgba(255,255,255,0.08); }
        .mode-toggle button.active { background:rgba(139,92,246,0.25);color:#fff;border-color:var(--accent);box-shadow:0 0 16px rgba(139,92,246,0.15); }
        .batch-textarea { width:100%;min-height:100px;padding:14px 18px;font-size:0.9rem;font-family:var(--font-mono);color:var(--text-primary);background:var(--input-bg);border:1px solid var(--glass-border);border-radius:14px;outline:none;resize:vertical;transition:all 0.4s var(--smooth);display:none;backdrop-filter:blur(8px); }
        .batch-textarea::placeholder { color:var(--text-muted); }
        .batch-textarea:focus { background:var(--input-bg-focus);border-color:var(--accent);box-shadow:var(--input-glow); }
        .batch-textarea.visible { display:block; }
        .batch-url-count { font-size:0.8rem;color:var(--text-muted);margin-top:8px;display:none; }
        .batch-url-count.visible { display:block; }
        .collapsible-header { display:flex;align-items:center;justify-content:space-between;padding:16px 24px;cursor:pointer;user-select:none;transition:all 0.3s var(--smooth); }
        .collapsible-header:hover { background:rgba(255,255,255,0.06); }
        .collapsible-header h3 { font-size:0.95rem;font-weight:600;color:var(--text-secondary); }
        .collapsible-header .chevron { font-size:0.8rem;color:var(--text-muted);transition:transform 0.4s var(--smooth); }
        .collapsible-header.open .chevron { transform:rotate(180deg); }
        .collapsible-body { max-height:0;overflow:hidden;transition:max-height 0.4s ease; }
        .collapsible-body.open { max-height:3000px; }
        .config-panel { margin-bottom:20px; }
        .config-content { padding:24px 28px; }
        .config-section { margin-bottom:24px; }
        .config-section:last-child { margin-bottom:0; }
        .config-label { font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px; }
        .section-divider { height:1px;background:var(--glass-border);margin:20px 0; }
        .radio-group { display:flex;gap:12px;flex-wrap:wrap; }
        .radio-group label { display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:10px;cursor:pointer;transition:all 0.3s ease;font-size:0.9rem;color:var(--text-secondary); }
        .radio-group label:hover { background:rgba(255,255,255,0.1);transform:translateY(-1px); }
        .radio-group input[type="radio"] { display:none; }
        .radio-group input[type="radio"]:checked + span { color:var(--text-primary); }
        .radio-group label:has(input:checked) { border-color:var(--accent);background:rgba(139,92,246,0.15);box-shadow:0 0 16px rgba(139,92,246,0.1); }
        .checkbox-group { display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px; }
        .checkbox-item { display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:10px;cursor:pointer;transition:all 0.3s ease;font-size:0.88rem;color:var(--text-secondary); }
        .checkbox-item:hover { background:rgba(255,255,255,0.1);transform:translateY(-1px); }
        .checkbox-item input[type="checkbox"] { display:none; }
        .checkbox-item:has(input:checked) { border-color:var(--accent);background:rgba(139,92,246,0.15);color:var(--text-primary);box-shadow:0 0 16px rgba(139,92,246,0.1); }
        .toggle-row { display:flex;align-items:center;justify-content:space-between;padding:8px 0; }
        .toggle-row span { font-size:0.9rem;color:var(--text-secondary); }
        .toggle-switch { position:relative;width:48px;height:26px; }
        .toggle-switch input { display:none; }
        .toggle-slider { position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:13px;cursor:pointer;transition:all 0.4s var(--smooth); }
        .toggle-slider::after { content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:all 0.4s var(--smooth);box-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .toggle-switch input:checked + .toggle-slider { background:linear-gradient(135deg,#7c3aed,#6366f1);box-shadow:0 0 16px rgba(139,92,246,0.3); }
        .toggle-switch input:checked + .toggle-slider::after { transform:translateX(22px);box-shadow:0 2px 12px rgba(139,92,246,0.4); }
        .slider-row { display:flex;align-items:center;gap:16px;padding:8px 0; }
        .slider-row label { font-size:0.9rem;color:var(--text-secondary);min-width:100px; }
        .slider-row input[type="range"] { flex:1;-webkit-appearance:none;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none; }
        .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none;width:20px;height:20px;background:linear-gradient(135deg,#a78bfa,#7c3aed);border-radius:50%;cursor:pointer;box-shadow:0 0 12px rgba(139,92,246,0.5),0 2px 6px rgba(0,0,0,0.2);transition:all 0.3s var(--smooth); }
        .slider-row input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.2);box-shadow:0 0 20px rgba(139,92,246,0.6),0 2px 8px rgba(0,0,0,0.3); }
        .slider-row .slider-value { font-size:0.9rem;font-family:var(--font-mono);color:var(--text-primary);min-width:36px;text-align:center;padding:4px 8px;background:var(--input-bg);border-radius:6px; }
        .number-input { width:80px;padding:8px 12px;font-size:0.9rem;font-family:var(--font-mono);color:var(--text-primary);background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;outline:none;text-align:center;transition:all 0.3s ease; }
        .number-input:focus { border-color:var(--accent);box-shadow:0 0 12px rgba(99,102,241,0.2); }
        .expandable-textarea { width:100%;min-height:60px;padding:10px 12px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:10px;color:var(--text-primary);font-family:var(--font-mono);font-size:0.82rem;resize:vertical;line-height:1.5;transition:border-color 0.3s; }
        .expandable-textarea:focus { outline:none;border-color:var(--accent);box-shadow:var(--input-glow); }
        .expandable-textarea::placeholder { color:var(--text-muted); }
        .selector-row { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
        .selector-row label { font-size:0.85rem;font-family:var(--font-mono);color:var(--text-muted);min-width:120px; }
        .selector-row input { flex:1;padding:8px 14px;font-size:0.85rem;font-family:var(--font-mono);color:var(--text-primary);background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;outline:none;transition:all 0.3s ease; }
        .selector-row input:focus { border-color:var(--accent);box-shadow:0 0 12px rgba(99,102,241,0.2); }
        .selector-row input::placeholder { color:var(--text-muted); }
        .interaction-row { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
        .interaction-row select { padding:7px 10px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;color:var(--text-primary);font-family:var(--font-ui);font-size:0.82rem; }
        .interaction-row .int-selector { flex:1;min-width:0;padding:7px 12px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;color:var(--text-primary);font-family:var(--font-ui);font-size:0.82rem;outline:none; }
        .interaction-row .int-selector:focus { border-color:var(--accent); }
        .interaction-row .int-delay { width:80px;padding:7px 10px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;color:var(--text-primary);font-family:var(--font-mono);font-size:0.82rem;outline:none; }
        .btn-add-action { padding:7px 14px;font-size:0.8rem;font-family:var(--font-ui);color:var(--accent-light);background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:8px;cursor:pointer;transition:all 0.3s ease; }
        .btn-add-action:hover { background:rgba(99,102,241,0.3);color:#fff; }
        .btn-remove-action { padding:6px 10px;font-size:0.8rem;font-family:var(--font-ui);color:var(--error);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;cursor:pointer;transition:all 0.3s ease; }
        .btn-remove-action:hover { background:rgba(239,68,68,0.25);color:#fff; }
        .progress-section { opacity:0;transform:translateY(16px);max-height:0;overflow:hidden;transition:all 0.5s var(--smooth);padding:0 28px;margin-bottom:0; }
        .progress-section.visible { opacity:1;transform:translateY(0);max-height:600px;padding:28px;margin-bottom:24px; }
        .progress-bar-container { height:6px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-bottom:12px; }
        .progress-bar { height:100%;background:linear-gradient(90deg,#7c3aed,#6366f1,#3b82f6,#8b5cf6,#7c3aed);background-size:400% 100%;animation:progressShimmer 2.5s linear infinite;border-radius:10px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);width:0%;box-shadow:0 0 12px rgba(139,92,246,0.4); }
        @keyframes progressShimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
        .progress-info { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
        .progress-text { font-size:0.9rem;color:var(--text-secondary); }
        .progress-percent { font-size:0.9rem;font-family:var(--font-mono);color:var(--accent-light); }
        .log-area { width:100%;height:200px;overflow-y:auto;padding:14px 18px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:14px;font-family:var(--font-mono);font-size:0.8rem;line-height:1.8;backdrop-filter:blur(8px); }
        .log-entry { display:flex;gap:10px;padding:2px 0; }
        .log-time { color:var(--text-muted);white-space:nowrap;flex-shrink:0; }
        .log-msg { color:var(--text-secondary);word-break:break-all; }
        .log-msg.info { color:var(--info); }
        .log-msg.success { color:var(--success); }
        .log-msg.error { color:var(--error); }
        .log-msg.warning { color:var(--warning); }
        .results-section { opacity:0;transform:translateY(20px);transition:opacity 0.6s var(--smooth),transform 0.6s var(--smooth);pointer-events:none;display:block; }
        .results-section.visible { opacity:1;transform:translateY(0);pointer-events:auto; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
        .summary-cards { display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:24px; }
        .summary-card { padding:20px 18px;text-align:center;transition:transform 0.3s var(--bouncy),box-shadow 0.3s ease,border-color 0.3s ease; }
        .summary-card:hover { transform:translateY(-4px) scale(1.02);box-shadow:0 12px 40px rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.3); }
        .summary-card .icon { font-size:1.6rem;margin-bottom:8px; }
        .summary-card .value { font-size:1.8rem;font-weight:700;font-family:var(--font-mono);color:var(--text-primary); }
        .summary-card .label { font-size:0.8rem;color:var(--text-muted);margin-top:4px; }
        .tab-nav { display:flex;gap:4px;padding:6px;overflow-x:auto; }

    <script>
        /* ============================================
           Global State
           ============================================ */
        let currentData = null;
        let currentMode = 'single';
        let scrapeAbortController = null;
        let currentTaskId = null;
        let progressInterval = null;
        let isConnected = false;
        const API_BASE = '';

        /* ============================================
           Initialization
           ============================================ */
        document.addEventListener('DOMContentLoaded', function () {
            checkHealth();
            setInterval(checkHealth, 30000);
            document.getElementById('urlInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    startScrape();
                }
            });
            document.getElementById('batchInput').addEventListener('input', function () {
                var lines = this.value.split('\n').filter(function (l) { return l.trim(); });
                document.getElementById('batchCount').textContent = lines.length + ' 个网址';
            });

        /* ============================================
           Ripple Effect on Buttons
           ============================================ */
        document.addEventListener('click', function(e) {
            var target = e.target.closest('.btn-primary, .btn-export, .btn-cancel, .mode-toggle button, .tab-btn, .filter-btn, .collapsible-header');
            if (!target) return;
            var rect = target.getBoundingClientRect();
            var ripple = document.createElement('span');
            ripple.className = 'ripple-effect';
            var size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            target.appendChild(ripple);
            setTimeout(function() { if (ripple.parentNode) ripple.parentNode.removeChild(ripple); }, 600);
        });

        /* ============================================
           Staggered Card Entrance
           ============================================ */
        function staggerCards() {
            var cards = document.querySelectorAll('.summary-card');
            cards.forEach(function(card, i) {
                card.style.animationDelay = (i * 0.08) + 's';
            });
        }        });

        /* ============================================
           Health Check
           ============================================ */
        async function checkHealth() {
            try {
                var res = await fetch(API_BASE + '/api/health', {
                    signal: AbortSignal.timeout(5000)
                });
                await res.json();
                isConnected = true;
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = '已连接';
            } catch (e) {
                isConnected = false;
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '未连接';
            }
        }

        /* ============================================
           Mode Toggle
           ============================================ */
        function setMode(mode) {
            currentMode = mode;
            var singleBtn = document.getElementById('modeSingle');
            var batchBtn = document.getElementById('modeBatch');
            var batchInput = document.getElementById('batchInput');
            var batchCount = document.getElementById('batchCount');
            var urlInput = document.getElementById('urlInput');
            if (mode === 'single') {
                singleBtn.classList.add('active');
                batchBtn.classList.remove('active');
                batchInput.classList.remove('visible');
                batchCount.classList.remove('visible');
                urlInput.style.display = '';
            } else {
                singleBtn.classList.remove('active');
                batchBtn.classList.add('active');
                batchInput.classList.add('visible');
                batchCount.classList.add('visible');
                urlInput.style.display = 'none';
            }
        }

        /* ============================================
           Collapsible Toggle
           ============================================ */
        function toggleCollapsible(name) {
            if (name === 'config') {
                var header = document.getElementById('configHeader');
                var body = document.getElementById('configBody');
                if (header) header.classList.toggle('open');
                if (body) body.classList.toggle('open');
            } else {
                var body = document.getElementById('selectorsBody');
                if (body) body.classList.toggle('open');
            }
        }

        /* ============================================
           Slider Update
           ============================================ */
        function updateSlider(type) {
            if (type === 'depth') {
                document.getElementById('depthValue').textContent = document.getElementById('depthSlider').value;
            } else {
                document.getElementById('maxPagesValue').textContent = document.getElementById('maxPagesSlider').value;
            }
        }

        /* ============================================
           Collect Config
           ============================================ */
        function collectConfig() {
            var extractTypes = [];
            document.querySelectorAll('input[name="extract"]:checked').forEach(function (cb) {
                extractTypes.push(cb.value);
            });
            var crawlMode = 'bfs';
            var crawlRadio = document.querySelector('input[name="crawlMode"]:checked');
            if (crawlRadio) crawlMode = crawlRadio.value;
            var interactions = [];
            document.querySelectorAll('.interaction-row').forEach(function (row) {
                var action = row.querySelector('select').value;
                var selector = row.querySelector('.int-selector').value;
                var delay = parseInt(row.querySelector('.int-delay').value) || 500;
                interactions.push({ action: action, selector: selector || null, delay_ms: delay });
            });
            var headers = null;
            var cookies = null;
            var proxy = document.getElementById('proxyInput').value.trim() || null;
            try {
                var ht = document.getElementById('headersInput').value.trim();
                if (ht) headers = JSON.parse(ht);
            } catch (e) { showToast('请求头 JSON 格式错误', 'error'); }
            try {
                var ct = document.getElementById('cookiesInput').value.trim();
                if (ct) cookies = JSON.parse(ct);
            } catch (e) { showToast('Cookies JSON 格式错误', 'error'); }
            return {
                extraction_mode: document.querySelector('input[name="mode"]:checked').value,
                extract_types: extractTypes,
                options: {
                    depth: parseInt(document.getElementById('depthSlider').value),
                    max_pages: parseInt(document.getElementById('maxPagesSlider').value),
                    same_domain: document.getElementById('sameDomain').checked,
                    timeout: parseInt(document.getElementById('timeoutInput').value) || 30,
                    custom_selectors: {
                        article_body: document.getElementById('selArticle').value || '',
                        price: document.getElementById('selPrice').value || '',
                        title: document.getElementById('selTitle').value || ''
                    },
                    crawl_mode: crawlMode,
                    delay_ms: parseInt(document.getElementById('delaySlider').value),
                    max_retries: parseInt(document.getElementById('maxRetriesInput').value),
                    proxy: proxy, cookies: cookies, headers: headers,
                    rotate_ua: document.getElementById('rotateUA').checked,
                    interactions: interactions,
                    wait_for_selector: document.getElementById('waitForSelector').value || null,
                    enable_websocket_capture: document.getElementById('wsCapture').checked,
                    enable_iframe_extraction: document.getElementById('iframeExtract').checked,
                    enable_shadow_dom: document.getElementById('shadowDom').checked,
                    discover_sitemap: document.getElementById('discoverSitemap').checked,
                    discover_hidden_links: document.getElementById('discoverHiddenLinks').checked
                }
            };
        }

        /* ============================================
           URL Validation
           ============================================ */
        function isValidURL(str) {
            try { var u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
            catch (e) { return false; }
        }

        /* ============================================
           Toast Notification
           ============================================ */
        function showToast(msg, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 4200);
        }

        /* ============================================
           Log
           ============================================ */
        function addLog(msg, type) {
            type = type || 'info';
            var logArea = document.getElementById('logArea');
            var now = new Date();
            var ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span class="log-time">' + escapeHTML(ts) + '</span><span class="log-msg ' + type + '">' + escapeHTML(msg) + '</span>';
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLog() { document.getElementById('logArea').innerHTML = ''; }

        /* ============================================
           Escape HTML
           ============================================ */
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        /* ============================================
           Progress Simulation
           ============================================ */
        function startProgressSimulation() {
            var pct = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressText').textContent = '正在爬取...';
            progressInterval = setInterval(function () {
                pct += Math.random() * 8;
                if (pct > 90) pct = 90;
                document.getElementById('progressBar').style.width = pct + '%';
                document.getElementById('progressPercent').textContent = Math.round(pct) + '%';
            }, 300);
        }

        function stopProgressSimulation(finalPct) {
            if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
            finalPct = finalPct !== undefined ? finalPct : 100;
            document.getElementById('progressBar').style.width = finalPct + '%';
            document.getElementById('progressPercent').textContent = finalPct + '%';
            document.getElementById('progressText').textContent = finalPct >= 100 ? '爬取完成' : '已停止';
        }

        /* ============================================
           Start Scrape
           ============================================ */
        async function startScrape() {
            var config = collectConfig();
            if (currentMode === 'single') {
                var url = document.getElementById('urlInput').value.trim();
                if (!url) { showToast('请输入要爬取的网址。', 'error'); return; }
                if (!isValidURL(url)) { showToast('请输入有效的 URL（以 http:// 或 https:// 开头）。', 'error'); return; }
            } else {
                var urls = document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
                if (urls.length === 0) { showToast('请至少输入一个网址。', 'error'); return; }
                if (!urls.every(function(u){return isValidURL(u);})) { showToast('请确保所有网址都是有效格式。', 'error'); return; }
            }
            if (!isConnected) { showToast('后端未连接，请确认服务已启动。', 'error'); return; }
            document.getElementById('scrapeBtn').disabled = true;
            document.getElementById('progressSection').classList.add('visible');
            document.getElementById('resultsSection').classList.remove('visible');
            clearLog();
            startProgressSimulation();
            addLog('开始爬取...', 'info');
            var body, endpoint;
            if (currentMode === 'single') {
                body = Object.assign({ url: document.getElementById('urlInput').value.trim() }, config);
                endpoint = '/api/scrape';
            } else {
                var batchUrls = document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
                body = Object.assign({ urls: batchUrls }, config);
                endpoint = '/api/scrape/batch';
            }
            try {
                scrapeAbortController = new AbortController();
                var scrapeTimeout = setTimeout(function() { scrapeAbortController.abort(); }, 180000);
                var res = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: scrapeAbortController.signal
                });
                clearTimeout(scrapeTimeout);
                stopProgressSimulation(95);
                addLog('收到响应，正在处理...', 'info');
                var data = await res.json();
                currentTaskId = data.task_id || null;
                if (data.success) {
                    stopProgressSimulation(100);
                    addLog('爬取完成：共爬取 ' + data.total_pages_scraped + ' 个页面。', 'success');
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(function(err) { addLog('警告：' + (typeof err === 'object' ? (err.error || err.url || JSON.stringify(err)) : err), 'warning'); });
                    }
                    currentData = data;
                    renderResults(data);
                    showToast('成功爬取 ' + data.total_pages_scraped + ' 个页面！', 'success');
                } else {
                    stopProgressSimulation(0);
                    addLog('爬取失败：' + (data.error || '未知错误'), 'error');
                    showToast('爬取失败：' + (data.error || '未知错误'), 'error');
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    stopProgressSimulation(0);
                    addLog('用户取消了爬取。', 'warning');
                    showToast('爬取已取消。', 'warning');
                } else {
                    stopProgressSimulation(0);
                    addLog('错误：' + e.message, 'error');
                    showToast('请求失败：' + e.message, 'error');
                }
            } finally {
                document.getElementById('scrapeBtn').disabled = false;
                scrapeAbortController = null;
                currentTaskId = null;
            }
        }

        /* ============================================
           Cancel Scrape
           ============================================ */
        async function cancelScrape() {
            if (scrapeAbortController) scrapeAbortController.abort();
            if (currentTaskId) {
                try {
                    var res = await fetch(API_BASE + '/api/scrape/cancel', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: currentTaskId })
                    });
                    var data = await res.json();
                    if (data.success && data.pages && data.pages.length > 0) {
                        stopProgressSimulation(100);
                        addLog('已中断爬取，已获取 ' + data.pages.length + ' 个页面的部分结果。', 'warning');
                        currentData = data;
                        renderResults(data);
                        showToast('已中断，显示已爬取的 ' + data.pages.length + ' 个页面', 'warning');
                    } else {
                        stopProgressSimulation(0);
                        addLog('爬取已取消。', 'warning');
                        showToast('爬取已取消。', 'warning');
                    }
                } catch (e) {
                    stopProgressSimulation(0);
                    addLog('爬取已取消。', 'warning');
                    showToast('爬取已取消。', 'warning');
                }
                currentTaskId = null;
            } else {
                stopProgressSimulation(0);
                addLog('爬取已取消。', 'warning');
                showToast('爬取已取消。', 'warning');
            }
        }

        /* ============================================
           Render Results
           ============================================ */
        function renderResults(data) {
            document.getElementById('resultsSection').classList.add('visible');
            document.getElementById('resultsSection').style.animation = 'none';
            setTimeout(function() { document.getElementById('resultsSection').style.animation = ''; }, 10);
            renderSummaryCards(data);
            renderTabs(data);
        }

        /* ============================================
           Summary Cards
           ============================================ */
        function renderSummaryCards(data) {
            var pages = data.pages || [];
            var totalLinks = 0, totalImages = 0, totalTables = 0;
            pages.forEach(function (p) {
                var ext = p.extracted || {};
                if (ext.links) totalLinks += (ext.links.all_count || 0);
                if (ext.media && ext.media.images) totalImages += ext.media.images.length;
                if (ext.structured && ext.structured.tables) totalTables += ext.structured.tables.length;
            });
            var cs = data.crawl_stats || {};
            var dur = cs.duration_seconds ? cs.duration_seconds.toFixed(1) + 's' : '-';
            var disc = cs.urls_discovered || 0;
            var h = '';
            h += '<div class="summary-card glass"><div class="icon">📄</div><div class="value">' + pages.length + '</div><div class="label">已爬取页面</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🔗</div><div class="value">' + totalLinks + '</div><div class="label">链接总数</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🖼️</div><div class="value">' + totalImages + '</div><div class="label">发现图片</div></div>';
            h += '<div class="summary-card glass"><div class="icon">📊</div><div class="value">' + totalTables + '</div><div class="label">表格</div></div>';
            h += '<div class="summary-card glass"><div class="icon">⏱️</div><div class="value">' + dur + '</div><div class="label">耗时</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🔍</div><div class="value">' + disc + '</div><div class="label">发现URL</div></div>';
            document.getElementById('summaryCards').innerHTML = h;
            if (typeof staggerCards === 'function') staggerCards();
        }

        /* ============================================
           Render Tabs
           ============================================ */
        function renderTabs(data) {
            var tabs = [
                { id: 'overview', label: '📋 概览', active: true },
                { id: 'text', label: '📝 文本内容' },
                { id: 'links', label: '🔗 链接' },
                { id: 'media', label: '🖼️ 媒体' },
                { id: 'structured', label: '📊 结构化数据' },
                { id: 'metadata', label: '🏷️ 元数据' },
                { id: 'apicalls', label: '📡 接口数据' },
                { id: 'business', label: '💰 商业数据' },
                { id: 'raw', label: '📜 原始数据' }
            ];
            var nav = document.getElementById('tabNav');
            var content = document.getElementById('tabContent');
            nav.innerHTML = tabs.map(function(t){
                return '<button class="tab-btn'+(t.active?' active':'')+'" onclick="switchTab(\''+t.id+'\',this)">'+t.label+'</button>';
            }).join('');
            content.innerHTML = tabs.map(function(t){
                return '<div class="tab-pane'+(t.active?' active':'')+'" id="tab-'+t.id+'"></div>';
            }).join('');
            renderOverview(data);
            renderText(data);
            renderLinks(data);
            renderMedia(data);
            renderStructured(data);
            renderMetadata(data);
            renderAPICalls(data);
            renderBusiness(data);
            renderRaw(data);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
            document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
            if (btn) btn.classList.add('active');
            var pane = document.getElementById('tab-' + id);
            if (pane) pane.classList.add('active');
        }

        /* ============================================
           Helper: formatBytes
           ============================================ */
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            var k = 1024, sizes = ['B','KB','MB','GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        /* ============================================
           Tab: Overview
           ============================================ */
        function renderOverview(data) {
            var pane = document.getElementById('tab-overview');
            var pages = data.pages || [];
            var h = '<div class="section-title">爬取概览</div>';
            var cs = data.crawl_stats || {};
            if (cs.total_pages != null || cs.duration_seconds != null) {
                h += '<div class="stats-bar">';
                if (cs.total_pages != null) h += '<div class="stats-bar-item">📄 页面: <span class="stats-val">' + cs.total_pages + '</span></div>';
                if (cs.total_bytes != null) h += '<div class="stats-bar-item">💾 大小: <span class="stats-val">' + formatBytes(cs.total_bytes) + '</span></div>';
                if (cs.duration_seconds != null) h += '<div class="stats-bar-item">⏱️ 耗时: <span class="stats-val">' + cs.duration_seconds.toFixed(1) + 's</span></div>';
                if (cs.pages_per_second != null) h += '<div class="stats-bar-item">🚀 速度: <span class="stats-val">' + cs.pages_per_second.toFixed(2) + ' 页/秒</span></div>';
                if (cs.urls_discovered != null) h += '<div class="stats-bar-item">🔍 发现: <span class="stats-val">' + cs.urls_discovered + ' 个URL</span></div>';
                h += '</div>';
            }
            pages.forEach(function(p,i){
                var ext = p.extracted || {};
                h += '<div class="glass" style="padding:18px;margin-bottom:14px;">';
                h += '<div style="font-weight:600;margin-bottom:8px;">📄 Page '+(i+1)+': '+escapeHTML(p.title||'无标题')+'</div>';
                h += '<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px;">URL: <a href="'+escapeHTML(p.url)+'" target="_blank" style="color:var(--accent-light);text-decoration:none;">'+escapeHTML(p.url)+'</a> &nbsp;|&nbsp; Status: <span style="color:'+(p.status_code===200?'var(--success)':'var(--error)')+'">'+p.status_code+'</span></div>';
                h += '<div style="display:flex;gap:20px;flex-wrap:wrap;font-size:0.85rem;color:var(--text-secondary);">';
                if (ext.text) h += '<span>📝 '+(ext.text.headings||[]).length+' 个标题</span>';
                if (ext.links) h += '<span>🔗 '+(ext.links.all_count||0)+' 个链接</span>';
                if (ext.media) h += '<span>🖼️ '+(ext.media.images||[]).length+' 张图片</span>';
                if (ext.structured) h += '<span>📊 '+(ext.structured.tables||[]).length+' 个表格</span>';
                if (ext.metadata && ext.metadata.description) h += '<span>🏷️ '+escapeHTML(ext.metadata.description).substring(0,80)+'...</span>';
                h += '</div></div>';
            });
            if (pages.length === 0) h += '<div class="empty-state"><div class="icon">📭</div><p>没有爬取到页面数据</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Text Content
           ============================================ */
        function renderText(data) {
            var pane = document.getElementById('tab-text');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var text = (p.extracted||{}).text;

                    h += '<div class="section-subtitle">📑 标题 ('+text.headings.length+')</div><div class="text-content">';
                    text.headings.forEach(function(heading){ h += '<'+heading.level+'>'+escapeHTML(heading.text)+'</'+heading.level+'>'; });
                    h += '</div>';
                }
                if (text.main_content) {
                    h += '<div class="section-subtitle">📄 主要内容</div><div class="json-viewer" style="max-height:300px;">'+escapeHTML(text.main_content)+'</div>';
                }
                if (text.paragraphs && text.paragraphs.length > 0) {
                    h += '<div class="section-subtitle">📝 段落 ('+text.paragraphs.length+')</div><div class="text-content">';
                    text.paragraphs.slice(0,20).forEach(function(p2){ h += '<p>'+escapeHTML(p2)+'</p>'; });

                    });

        /* ============================================
           Tab: Links
           ============================================ */
        function renderLinks(data) {
            var pane = document.getElementById('tab-links');
            var pages = data.pages || [];
            var h = '<div class="section-title">链接</div>';
            h += '<div class="filter-bar"><button class="filter-btn active" onclick="filterLinks(\'all\',this)">全部</button><button class="filter-btn" onclick="filterLinks(\'internal\',this)">🟢 内部链接</button><button class="filter-btn" onclick="filterLinks(\'external\',this)">🔵 外部链接</button></div>';
            var allLinks = [];
            pages.forEach(function(p){
                var links = (p.extracted||{}).links;
                if (!links) return;
                (links.internal||[]).forEach(function(l){
                    var url = typeof l==='string'?l:l.url;
                    var text = typeof l==='string'?'':(l.text||'');
                    allLinks.push({url:url,text:text,type:'internal',page:p.url});
                });
                (links.external||[]).forEach(function(l){
                    var url = typeof l==='string'?l:l.url;
                    var text = typeof l==='string'?'':(l.text||'');
                    allLinks.push({url:url,text:text,type:'external',page:p.url});
                });
            });
            if (allLinks.length > 0) {
                h += '<div style="overflow-x:auto;"><table class="data-table" id="linksTable"><thead><tr><th>类型</th><th>URL</th><th>文本</th><th>来源页面</th></tr></thead><tbody>';
                allLinks.forEach(function(link){
                    h += '<tr data-type="'+link.type+'"><td><span class="badge badge-'+link.type+'">'+(link.type==='internal'?'内部':'外部')+'</span></td><td><a href="'+escapeHTML(link.url)+'" target="_blank">'+escapeHTML(link.url)+'</a></td><td>'+escapeHTML(link.text)+'</td><td style="font-size:0.78rem;color:var(--text-muted);">'+escapeHTML(link.page)+'</td></tr>';
                });
                h += '</tbody></table></div>';
            } else {
                h += '<div class="empty-state"><div class="icon">🔗</div><p>没有找到链接</p></div>';
            }
            var sitemapUrls = [];
            pages.forEach(function(p){ var l=(p.extracted||{}).links; if(l&&l.sitemap_urls) sitemapUrls=sitemapUrls.concat(l.sitemap_urls); });
            if (sitemapUrls.length > 0) {
                h += '<div class="section-subtitle">🗺️ Sitemap URLs ('+sitemapUrls.length+')</div><ul class="media-list">';
                sitemapUrls.forEach(function(u){ h += '<li>🗺️ '+escapeHTML(u)+'</li>'; });
                h += '</ul>';
            }
            var hiddenLinks = [];
            pages.forEach(function(p){ var l=(p.extracted||{}).links; if(l&&l.hidden_links) hiddenLinks=hiddenLinks.concat(l.hidden_links); });
            if (hiddenLinks.length > 0) {
                h += '<div class="section-subtitle">👁️ 隐藏链接 ('+hiddenLinks.length+')</div><ul class="media-list">';
                hiddenLinks.forEach(function(l){ var u=typeof l==='string'?l:l.url; h += '<li>👁️ '+escapeHTML(u)+'</li>'; });
                h += '</ul>';
            }
            pane.innerHTML = h;
        }

        function filterLinks(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
            if (btn) btn.classList.add('active');
            document.querySelectorAll('#linksTable tbody tr').forEach(function(row){
                row.style.display = (type==='all'||row.getAttribute('data-type')===type) ? '' : 'none';
            });
        }

        /* ============================================
           Tab: Media
           ============================================ */
        function renderMedia(data) {

            pages.forEach(function(p,i){

                }
                if (media.audio && media.audio.length > 0) {
                    h += '<div class="section-subtitle">🔊 音频 ('+media.audio.length+')</div><ul class="media-list">';

                pages.forEach(function(p){
                    var iframes = (p.extracted||{}).iframe_content || [];
                    iframes.forEach(function(iframe){

                        h += '<div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">SRC: <a href="'+escapeHTML(iframe.src||'')+'" target="_blank" style="color:var(--accent-light);text-decoration:none;">'+escapeHTML(iframe.src||'')+'</a>';
                        if (iframe.title) h += ' &nbsp;|&nbsp; Title: '+escapeHTML(iframe.title);
                        h += '</div>';
                        if (iframe.content) h += '<div class="json-viewer" style="max-height:150px;">'+escapeHTML(iframe.content).substring(0,2000)+'</div>';
                        h += '</div>';

                });
            }
            if (!h) h = '<div class="empty-state"><div class="icon">🖼️</div><p>没有媒体内容</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Structured Data
           ============================================ */
        function renderStructured(data) {

        function copyInlineJSON(pi,ii) {
            if (currentData && currentData.pages && currentData.pages[pi]) {
                var s = currentData.pages[pi].extracted.structured;
                if (s && s.inline_json && s.inline_json[ii]) copyToClipboard(JSON.stringify(s.inline_json[ii],null,2));
            }
        }

        /* ============================================
           Tab: API Calls
           ============================================ */
        function renderAPICalls(data) {
            var pane = document.getElementById('tab-apicalls');
            var pages = data.pages || [];
            var allCalls = [];
            pages.forEach(function(p){
                var calls = (p.extracted||{}).api_calls || [];
                calls.forEach(function(c){ allCalls.push(c); });
            });
            var h = '<div class="section-title">📡 捕获的 API 请求 ('+allCalls.length+')</div>';
            if (allCalls.length > 0) {
                h += '<div style="overflow-x:auto;"><table class="api-table"><thead><tr><th>方法</th><th>URL</th><th>状态</th><th>Content-Type</th><th>响应预览</th></tr></thead><tbody>';
                allCalls.forEach(function(call){
                    var method = (call.method||'GET').toUpperCase();
                    var bc = 'badge-other';
                    if (method==='GET') bc='badge-get'; else if (method==='POST') bc='badge-post'; else if (method==='PUT') bc='badge-put'; else if (method==='DELETE') bc='badge-delete';
                    h += '<tr><td><span class="badge '+bc+'">'+escapeHTML(method)+'</span></td><td style="word-break:break-all;"><a href="'+escapeHTML(call.url||'')+'" target="_blank">'+escapeHTML(call.url||'')+'</a></td><td>'+(call.status||'')+'</td><td style="font-size:0.8rem;">'+escapeHTML(call.content_type||'')+'</td><td style="max-width:300px;font-family:var(--font-mono);font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHTML((call.response_preview||'').substring(0,200))+'</td></tr>';
                });
                h += '</tbody></table></div>';
            } else {
                h += '<div class="empty-state"><div class="icon">📡</div><p>没有捕获到 API 请求</p></div>';
            }
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Business Data
           ============================================ */
        function renderBusiness(data) {
            var pane = document.getElementById('tab-business');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var biz = (p.extracted||{}).business;
                if (!biz) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                var sections = [
                    {key:'prices',icon:'💰',label:'价格'},{key:'ratings',icon:'⭐',label:'评分'},
                    {key:'dates',icon:'📅',label:'日期'},{key:'locations',icon:'📍',label:'地点'}
                ];
                sections.forEach(function(s){
                    var items = biz[s.key];
                    if (items && items.length) {
                        h += '<div class="section-subtitle">'+s.icon+' '+s.label+' ('+items.length+')</div><ul class="media-list">';
                        items.forEach(function(item){
                            var display = typeof item==='object'?JSON.stringify(item):String(item);
                            h += '<li>'+s.icon+' '+escapeHTML(display)+'</li>';
                        });
                        h += '</ul>';
                    }
                });
            });
            if (!h) h = '<div class="empty-state"><div class="icon">💰</div><p>没有商业数据</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Raw JSON
           ============================================ */
        function renderRaw(data) {
            var pane = document.getElementById('tab-raw');
            var json = JSON.stringify(data, null, 2);
            var h = '<div class="section-title">原始 JSON 响应</div>';
            h += '<button class="copy-btn" style="margin-bottom:10px;" onclick="copyRawJSON()">📋 复制到剪贴板</button>';
            h += '<div class="json-viewer" id="rawJson">'+escapeHTML(json)+'</div>';
            pane.innerHTML = h;
        }

        function copyRawJSON() {
            if (currentData) copyToClipboard(JSON.stringify(currentData, null, 2));
        }

        /* ============================================
           Clipboard Helper
           ============================================ */
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function(){
                showToast('已复制到剪贴板！', 'success');
            }).catch(function(){
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('已复制到剪贴板！', 'success');
            });
        }

        /* ============================================
           Export: JSON
           ============================================ */
        function exportJSON() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
            downloadBlob(blob, 'scrape-results.json');
            showToast('JSON 已导出！', 'success');
        }

        /* ============================================
           Export: CSV
           ============================================ */
        function exportCSV() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var rows = [['URL','Title','Status','Type','Content']];
            (currentData.pages||[]).forEach(function(p){
                var ext = p.extracted || {};
                if (ext.links) {
                    (ext.links.internal||[]).forEach(function(u){ var url=typeof u==='string'?u:u.url; rows.push([p.url,p.title||'',p.status_code,'link-internal',url]); });
                    (ext.links.external||[]).forEach(function(u){ var url=typeof u==='string'?u:u.url; rows.push([p.url,p.title||'',p.status_code,'link-external',url]); });
                }
                if (ext.media && ext.media.images) {
                    ext.media.images.forEach(function(img){ var s=typeof img==='string'?img:(img.url||img.src||''); rows.push([p.url,p.title||'',p.status_code,'image',s]); });
                }
                if (ext.text && ext.text.main_content) rows.push([p.url,p.title||'',p.status_code,'text',ext.text.main_content.substring(0,500)]);
                if (ext.metadata) {
                    rows.push([p.url,p.title||'',p.status_code,'description',ext.metadata.description||'']);
                    rows.push([p.url,p.title||'',p.status_code,'keywords',ext.metadata.keywords||'']);
                }
            });
            var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
            var blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
            downloadBlob(blob, 'scrape-results.csv');
            showToast('CSV 已导出！', 'success');
        }

        /* ============================================
           Export: Excel
           ============================================ */
        function exportExcel() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var xml = '<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n';
            xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
            xml += '<Styles>\n<Style ss:ID="header"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#4F46E5" ss:Pattern="Solid"/></Style>\n';
            xml += '<Style ss:ID="cell"><Font ss:Color="#333333"/></Style>\n</Styles>\n';
            xml += '<Worksheet ss:Name="Scrape Results"><Table>\n<Row>';
            ['URL','Title','Status','Type','Content'].forEach(function(hdr){ xml += '<Cell ss:StyleID="header"><Data ss:Type="String">'+escapeXML(hdr)+'</Data></Cell>'; });
            xml += '</Row>\n';
            (currentData.pages||[]).forEach(function(p){
                var ext = p.extracted || {};
                if (ext.text && ext.text.main_content) {
                    xml += '<Row><Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.url)+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.title||'')+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="Number">'+p.status_code+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">text</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(ext.text.main_content.substring(0,500))+'</Data></Cell></Row>\n';
                }
                if (ext.links) {
                    [].concat(ext.links.internal||[],ext.links.external||[]).forEach(function(u){
                        var url=typeof u==='string'?u:u.url;
                        xml += '<Row><Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.url)+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.title||'')+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="Number">'+p.status_code+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">link</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(url)+'</Data></Cell></Row>\n';
                    });
                }
            });
            xml += '</Table></Worksheet>\n</Workbook>';
            var blob = new Blob([xml], { type: 'application/vnd.ms-excel' });
            downloadBlob(blob, 'scrape-results.xls');
            showToast('Excel 已导出！', 'success');
        }

        function escapeXML(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ============================================
           Download Helper
           ============================================ */
        function downloadBlob(blob, filename) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /* ============================================
           Interaction Management
           ============================================ */
        function addInteraction() {
            var list = document.getElementById('interactionsList');
            var row = document.createElement('div');
            row.className = 'interaction-row';
            row.innerHTML = '<select onchange="toggleIntSelector(this)"><option value="scroll_to_bottom">滚动到底部</option><option value="click">点击元素</option><option value="wait">等待</option><option value="hover">悬停</option><option value="scroll_to">滚动到元素</option><option value="type_text">输入文本</option><option value="select_option">选择选项</option></select><input type="text" class="int-selector" placeholder="CSS 选择器（可选）"><input type="number" class="int-delay" value="500" min="0" max="30000" step="100" placeholder="延迟ms"><button class="btn-remove-action" onclick="removeInteraction(this)">✕</button>';
            list.appendChild(row);
        }

        function removeInteraction(btn) {
            var row = btn.closest('.interaction-row');
            if (row) row.remove();
        }

        function toggleIntSelector(sel) {
            var row = sel.closest('.interaction-row');
            var selectorInput = row.querySelector('.int-selector');
            var val = sel.value;
            if (val === 'scroll_to_bottom' || val === 'wait') {
                selectorInput.disabled = true;
                selectorInput.placeholder = '无需选择器';
            } else {
                selectorInput.disabled = false;
                selectorInput.placeholder = 'CSS 选择器';
            }
        }


        /* ============================================
           Page Switching
           ============================================ */
        var activePage = 'scraper';
        function switchPage(page) {
            activePage = page;
            document.getElementById('tabScraper').classList.toggle('active', page==='scraper');
            document.getElementById('tabHotlist').classList.toggle('active', page==='hotlist');
            document.getElementById('tabGithub').classList.toggle('active', page==='github');
            document.getElementById('scraperSection').classList.toggle('hl-hidden', page!=='scraper');
            document.getElementById('hotlistSection').classList.toggle('hl-hidden', page!=='hotlist');
            document.getElementById('githubSection').classList.toggle('hl-hidden', page!=='github');
            if (page==='hotlist') loadHotlist(activeHotlistPlatform);
            if (page==='github') loadGithubTrending(activeGithubSince);
        }

        /* ============================================
           Settings Panel
           ============================================ */
        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('show');
            document.getElementById('settingsPanel').classList.add('show');
        }
        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('show');
            document.getElementById('settingsPanel').classList.remove('show');
        }

        /* ============================================
           Custom Background
           ============================================ */
        function applyCustomBg(url) {
            var layer = document.getElementById('customBgLayer');
            if (!url || !url.trim()) {
                document.body.removeAttribute('data-bg');
                if (layer) { layer.style.display = 'none'; layer.style.backgroundImage = ''; }
                document.getElementById('bgPreview').style.display = 'none';
                return;
            }
            url = url.trim();
            document.body.setAttribute('data-bg', 'custom');
            if (layer) { layer.style.display = 'block'; layer.style.backgroundImage = 'url(' + url + ')'; }
            var preview = document.getElementById('bgPreview');
            preview.style.backgroundImage = 'url(' + url + ')';
            preview.style.display = 'block';
        }
        function saveCustomBg() {
            var url = document.getElementById('bgImageUrl').value.trim();
            if (!url) { showToast('请先输入图片URL', 'error'); return; }
            localStorage.setItem('ws-bg-image', url);
            showToast('✅ 背景已保存！刷新页面后仍生效', 'success');
        }
        function applyPreset(name) {
            var presets = {
                'default': '',
                'mesh': 'https://images.unsplash.com/photo-1557683316-973673baf926?w=1920&q=80',
                'aurora': 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1920&q=80'
            };
            if (name === 'default') {
                document.body.removeAttribute('data-bg');
                var _cbl = document.getElementById('customBgLayer'); if (_cbl) { _cbl.style.display = 'none'; _cbl.style.backgroundImage = ''; }
                localStorage.removeItem('ws-bg-image');
                document.getElementById('bgImageUrl').value = '';
                document.getElementById('bgPreview').style.display = 'none';
            } else {
                var url = presets[name] || '';
                document.getElementById('bgImageUrl').value = url;
                applyCustomBg(url);
            }
        }

        /* ============================================
           Hotlist
           ============================================ */
        var activeHotlistPlatform = 'weibo';
        function loadHotlist(platform) {
            activeHotlistPlatform = platform;
            document.querySelectorAll('.platform-tab').forEach(function(t){t.classList.toggle('active', t.getAttribute('data-platform')===platform)});
            document.getElementById('hotlistContent').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>';
            fetch('/api/hotlist?platform=' + platform)
                .then(function(r){return r.json()})
                .then(function(data) {
                    if (data.success && data.items) {
                        var timeStr = '更新: ' + (data.updated_at || '').replace('T',' ').substring(0,19);
                        document.getElementById('hotlistTime').textContent = timeStr;
                        var h = '';
                        data.items.forEach(function(item, idx) {
                            var rankClass = item.rank<=3 ? ' top'+item.rank : '';
                            h += `<div class="list-item" onclick="window.open('${(item.url||'#').replace(/'/g, "\\'")}','_blank')">`;
                            h += '<div class="list-rank' + rankClass + '">' + item.rank + '</div>';
                            h += '<div class="list-info"><div class="list-title">' + escapeHTML(item.title) + '</div>';
                            h += '<div class="list-meta"><span class="list-heat">' + (item.heat||'') + '</span></div></div></div>';
                        });
                        document.getElementById('hotlistContent').innerHTML = h || '<div class="empty-state"><p>暂无数据</p></div>';
                    } else {
                        document.getElementById('hotlistContent').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
                    }
                })
                .catch(function(){document.getElementById('hotlistContent').innerHTML='<div class="empty-state"><p>网络错误</p></div>'});
        }
        function refreshHotlist() { loadHotlist(activeHotlistPlatform); }
        function exportHotlist(format) {
            fetch('/api/hotlist/export?platform=' + activeHotlistPlatform + '&format=' + format)
                .then(function(r){return r.blob()})
                .then(function(blob){
                    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
                    a.download='hotlist_'+activeHotlistPlatform+'.'+(format==='excel'?'xls':format);
                    a.click(); URL.revokeObjectURL(a.href);
                });
        }

        /* ============================================
           GitHub Trending
           ============================================ */
        var activeGithubSince = 'daily';
        var githubLangColors = {Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#3178c6',Java:'#b07219','C++':'#f34b7d',C:'#555555',Go:'#00ADD8',Rust:'#dea584',Ruby:'#701516',PHP:'#4F5D95',Swift:'#F05138',Kotlin:'#A97BFF',Shell:'#89e051',Dart:'#00B4AB',Vue:'#41b883',HTML:'#e34c26',CSS:'#563d7c',Scala:'#c22d40',R:'#198CE7',Jupyter:'#DA5B0B',Cuda:'#3A4E3A'};
        function loadGithubTrending(since) {
            activeGithubSince = since;
            document.querySelectorAll('.period-tab').forEach(function(t){t.classList.toggle('active', t.getAttribute('data-since')===since)});
            document.getElementById('githubContent').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>';
            fetch('/api/github/trending?since=' + since)
                .then(function(r){return r.json()})
                .then(function(data) {
                    if (data.repos && data.repos.length) {
                        var timeStr = '更新: ' + (data.cached_at||'').replace('T',' ').substring(0,19);
                        if (data.cached) timeStr += ' (缓存)';
                        timeStr += ' | 共 ' + data.repos.length + ' 个仓库';
                        document.getElementById('githubTime').textContent = timeStr;
                        var h = '';
                        data.repos.forEach(function(repo) {
                            var rankClass = repo.rank<=3 ? ' top'+repo.rank : '';
                            var langColor = githubLangColors[repo.language] || '#8b8b8b';
                            h += '<div class="list-item" style="flex-wrap:wrap;cursor:default">';
                            h += '<div class="list-rank' + rankClass + '">' + repo.rank + '</div>';
                            h += '<div class="list-info"><div class="list-title">' + escapeHTML(repo.owner)+'/'+escapeHTML(repo.name) + '</div>';
                            if (repo.description) h += '<div class="desc-text">' + escapeHTML(repo.description) + '</div>';
                            h += '<div class="list-meta">';
                            if (repo.language) h += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+langColor+'"></span> '+escapeHTML(repo.language)+'</span>';
                            h += '<span style="color:#fbbf24">⭐ '+repo.stars.toLocaleString()+'</span>';
                            h += '<span style="color:#94a3b8">🍴 '+repo.forks.toLocaleString()+'</span>';
                            if (repo.stars_period>0) { var lbl=since==='daily'?'今日':since==='weekly'?'本周':'本月'; h+='<span style="color:#10b981">🔥 +'+repo.stars_period.toLocaleString()+' '+lbl+'</span>'; }
                            h += '</div></div>';
                            h += '<div class="list-actions">';
                            h += '<button class="btn-sm" onclick="event.stopPropagation();copyCloneUrl(this,' + JSON.stringify(escapeHTML(repo.owner)+'/'+escapeHTML(repo.name)) + ')">📋 复制</button>';
                            h += `<button class="btn-sm" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="event.stopPropagation();window.open('${escapeHTML(repo.url)}','_blank')">🔗 访问</button>`;
                            h += '</div></div>';
                        });
                        document.getElementById('githubContent').innerHTML = h;
                    } else {
                        document.getElementById('githubContent').innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
                    }
                })
                .catch(function(e){document.getElementById('githubContent').innerHTML='<div class="empty-state"><p>加载失败: '+e.message+'</p></div>'});
        }
        function refreshGithubTrending() { loadGithubTrending(activeGithubSince); }
        function copyCloneUrl(btn, repoName) {
            var url = 'https://github.com/' + repoName;
            navigator.clipboard.writeText(url).then(function(){
                btn.textContent='✅ 已复制';
                setTimeout(function(){btn.innerHTML='📋 复制'},2000);
            }).catch(function(){
                var ta=document.createElement('textarea');ta.value=url;
                document.body.appendChild(ta);ta.select();document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent='✅ 已复制';
                setTimeout(function(){btn.innerHTML='📋 复制'},2000);
            });
        }
        function exportGithubTrending(format) {
            fetch('/api/github/trending/export?since='+activeGithubSince+'&format='+format)
                .then(function(r){return r.blob()})
                .then(function(blob){
                    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
                    a.download='github-trending-'+activeGithubSince+'.'+(format==='excel'?'xls':format);
                    a.click(); URL.revokeObjectURL(a.href);
                });
        }

        /* ============================================
           Init: restore saved background
           ============================================ */
        (function(){
            var saved = localStorage.getItem('ws-bg-image');
            if (saved) {
                document.getElementById('bgImageUrl').value = saved;
                applyCustomBg(saved);
            }
        })();

    </script>
</body>
</html>
