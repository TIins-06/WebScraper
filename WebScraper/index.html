        /* ============================================
           Slider Update
           ============================================ */
        function updateSlider(type) {
            if (type === 'depth') {
                document.getElementById('depthValue').textContent = document.getElementById('depthSlider').value;
            } else {
                document.getElementById('maxPagesValue').textContent = document.getElementById('maxPagesSlider').value;
            }
        }

        /* ============================================
           Collect Config
           ============================================ */
        function collectConfig() {
            var extractTypes = [];
            document.querySelectorAll('input[name="extract"]:checked').forEach(function (cb) {
                extractTypes.push(cb.value);
            });
            var crawlMode = 'bfs';
            var crawlRadio = document.querySelector('input[name="crawlMode"]:checked');
            if (crawlRadio) crawlMode = crawlRadio.value;
            var interactions = [];
            document.querySelectorAll('.interaction-row').forEach(function (row) {
                var action = row.querySelector('select').value;
                var selector = row.querySelector('.int-selector').value;
                var delay = parseInt(row.querySelector('.int-delay').value) || 500;
                interactions.push({ action: action, selector: selector || null, delay_ms: delay });
            });
            var headers = null;
            var cookies = null;
            var proxy = document.getElementById('proxyInput').value.trim() || null;
            try {
                var ht = document.getElementById('headersInput').value.trim();
                if (ht) headers = JSON.parse(ht);
            } catch (e) { showToast('请求头 JSON 格式错误', 'error'); }
            try {
                var ct = document.getElementById('cookiesInput').value.trim();
                if (ct) cookies = JSON.parse(ct);
            } catch (e) { showToast('Cookies JSON 格式错误', 'error'); }
            return {
                extraction_mode: document.querySelector('input[name="mode"]:checked').value,
                extract_types: extractTypes,
                options: {
                    depth: parseInt(document.getElementById('depthSlider').value),
                    max_pages: parseInt(document.getElementById('maxPagesSlider').value),
                    same_domain: document.getElementById('sameDomain').checked,
                    timeout: parseInt(document.getElementById('timeoutInput').value) || 30,
                    custom_selectors: {
                        article_body: document.getElementById('selArticle').value || '',
                        price: document.getElementById('selPrice').value || '',
                        title: document.getElementById('selTitle').value || ''
                    },
                    crawl_mode: crawlMode,
                    delay_ms: parseInt(document.getElementById('delaySlider').value),
                    max_retries: parseInt(document.getElementById('maxRetriesInput').value),
                    proxy: proxy, cookies: cookies, headers: headers,
                    rotate_ua: document.getElementById('rotateUA').checked,
                    interactions: interactions,
                    wait_for_selector: document.getElementById('waitForSelector').value || null,
                    enable_websocket_capture: document.getElementById('wsCapture').checked,
                    enable_iframe_extraction: document.getElementById('iframeExtract').checked,
                    enable_shadow_dom: document.getElementById('shadowDom').checked,
                    discover_sitemap: document.getElementById('discoverSitemap').checked,
                    discover_hidden_links: document.getElementById('discoverHiddenLinks').checked
                }
            };
        }

        /* ============================================
           URL Validation
           ============================================ */
        function isValidURL(str) {
            try { var u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
            catch (e) { return false; }
        }

        /* ============================================
           Toast Notification
           ============================================ */
        function showToast(msg, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 4200);
        }

        /* ============================================
           Log
           ============================================ */
        function addLog(msg, type) {
            type = type || 'info';
            var logArea = document.getElementById('logArea');
            var now = new Date();
            var ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span class="log-time">' + escapeHTML(ts) + '</span><span class="log-msg ' + type + '">' + escapeHTML(msg) + '</span>';
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLog() { document.getElementById('logArea').innerHTML = ''; }

        /* ============================================
           Escape HTML
           ============================================ */
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        /* ============================================
           Progress Simulation
           ============================================ */
        function startProgressSimulation() {
            var pct = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressText').textContent = '正在爬取...';
            progressInterval = setInterval(function () {
                pct += Math.random() * 8;
                if (pct > 90) pct = 90;
                document.getElementById('progressBar').style.width = pct + '%';
                document.getElementById('progressPercent').textContent = Math.round(pct) + '%';
            }, 300);
        }

        function stopProgressSimulation(finalPct) {
            if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
            finalPct = finalPct !== undefined ? finalPct : 100;
            document.getElementById('progressBar').style.width = finalPct + '%';
            document.getElementById('progressPercent').textContent = finalPct + '%';
            document.getElementById('progressText').textContent = finalPct >= 100 ? '爬取完成' : '已停止';
        }

        /* ============================================
           Start Scrape
           ============================================ */
        async function startScrape() {
            var config = collectConfig();
            if (currentMode === 'single') {
                var url = document.getElementById('urlInput').value.trim();
                if (!url) { showToast('请输入要爬取的网址。', 'error'); return; }
                if (!isValidURL(url)) { showToast('请输入有效的 URL（以 http:// 或 https:// 开头）。', 'error'); return; }
            } else {
                var urls = document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
                if (urls.length === 0) { showToast('请至少输入一个网址。', 'error'); return; }
                if (!urls.every(function(u){return isValidURL(u);})) { showToast('请确保所有网址都是有效格式。', 'error'); return; }
            }
            if (!isConnected) { showToast('后端未连接，请确认服务已启动。', 'error'); return; }
            document.getElementById('scrapeBtn').disabled = true;
            document.getElementById('progressSection').classList.add('visible');
            document.getElementById('resultsSection').classList.remove('visible');
            clearLog();
            startProgressSimulation();
            addLog('开始爬取...', 'info');
            var body, endpoint;
            if (currentMode === 'single') {
                body = Object.assign({ url: document.getElementById('urlInput').value.trim() }, config);
                endpoint = '/api/scrape';
            } else {
                var batchUrls = document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
                body = Object.assign({ urls: batchUrls }, config);
                endpoint = '/api/scrape/batch';
            }
            try {
                scrapeAbortController = new AbortController();
                var res = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: scrapeAbortController.signal
                });
                stopProgressSimulation(95);
                addLog('收到响应，正在处理...', 'info');
                var data = await res.json();
                currentTaskId = data.task_id || null;
                if (data.success) {
                    stopProgressSimulation(100);
                    addLog('爬取完成：共爬取 ' + data.total_pages_scraped + ' 个页面。', 'success');
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(function(err) { addLog('警告：' + (typeof err === 'object' ? (err.error || err.url || JSON.stringify(err)) : err), 'warning'); });
                    }
                    currentData = data;
                    renderResults(data);
                    showToast('成功爬取 ' + data.total_pages_scraped + ' 个页面！', 'success');
                } else {
                    stopProgressSimulation(0);
                    addLog('爬取失败：' + (data.error || '未知错误'), 'error');
                    showToast('爬取失败：' + (data.error || '未知错误'), 'error');
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    stopProgressSimulation(0);
                    addLog('用户取消了爬取。', 'warning');
                    showToast('爬取已取消。', 'warning');
                } else {
                    stopProgressSimulation(0);
                    addLog('错误：' + e.message, 'error');
                    showToast('请求失败：' + e.message, 'error');
                }
            } finally {
                document.getElementById('scrapeBtn').disabled = false;
                scrapeAbortController = null;
                currentTaskId = null;
            }
        }

        /* ============================================
           Cancel Scrape
           ============================================ */
        async function cancelScrape() {
            if (scrapeAbortController) scrapeAbortController.abort();
            if (currentTaskId) {
                try {
                    var res = await fetch(API_BASE + '/api/scrape/cancel', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: currentTaskId })
                    });
                    var data = await res.json();
                    if (data.success && data.pages && data.pages.length > 0) {
                        stopProgressSimulation(100);
                        addLog('已中断爬取，已获取 ' + data.pages.length + ' 个页面的部分结果。', 'warning');
                        currentData = data;
                        renderResults(data);
                        showToast('已中断，显示已爬取的 ' + data.pages.length + ' 个页面', 'warning');
                    } else {
                        stopProgressSimulation(0);
                        addLog('爬取已取消。', 'warning');
                        showToast('爬取已取消。', 'warning');
                    }
                } catch (e) {
                    stopProgressSimulation(0);
                    addLog('爬取已取消。', 'warning');
                    showToast('爬取已取消。', 'warning');
                }
                currentTaskId = null;
            } else {
                stopProgressSimulation(0);
                addLog('爬取已取消。', 'warning');
                showToast('爬取已取消。', 'warning');
            }
        }

        /* ============================================
           Render Results
           ============================================ */
        function renderResults(data) {
            document.getElementById('resultsSection').classList.add('visible');
            document.getElementById('resultsSection').style.animation = 'none';
            setTimeout(function() { document.getElementById('resultsSection').style.animation = ''; }, 10);
            renderSummaryCards(data);
            renderTabs(data);
        }

        /* ============================================
           Summary Cards
           ============================================ */
        function renderSummaryCards(data) {
            var pages = data.pages || [];
            var totalLinks = 0, totalImages = 0, totalTables = 0;
            pages.forEach(function (p) {
                var ext = p.extracted || {};
                if (ext.links) totalLinks += (ext.links.all_count || 0);
                if (ext.media && ext.media.images) totalImages += ext.media.images.length;
                if (ext.structured && ext.structured.tables) totalTables += ext.structured.tables.length;
            });
            var cs = data.crawl_stats || {};
            var dur = cs.duration_seconds ? cs.duration_seconds.toFixed(1) + 's' : '-';
            var disc = cs.urls_discovered || 0;
            var h = '';
            h += '<div class="summary-card glass"><div class="icon">📄</div><div class="value">' + pages.length + '</div><div class="label">已爬取页面</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🔗</div><div class="value">' + totalLinks + '</div><div class="label">链接总数</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🖼️</div><div class="value">' + totalImages + '</div><div class="label">发现图片</div></div>';
            h += '<div class="summary-card glass"><div class="icon">📊</div><div class="value">' + totalTables + '</div><div class="label">表格</div></div>';
            h += '<div class="summary-card glass"><div class="icon">⏱️</div><div class="value">' + dur + '</div><div class="label">耗时</div></div>';
            h += '<div class="summary-card glass"><div class="icon">🔍</div><div class="value">' + disc + '</div><div class="label">发现URL</div></div>';
            document.getElementById('summaryCards').innerHTML = h;
            if (typeof staggerCards === 'function') staggerCards();
        }

        /* ============================================
           Render Tabs
           ============================================ */
        function renderTabs(data) {
            var tabs = [
                { id: 'overview', label: '📋 概览', active: true },
                { id: 'text', label: '📝 文本内容' },
                { id: 'links', label: '🔗 链接' },
                { id: 'media', label: '🖼️ 媒体' },
                { id: 'structured', label: '📊 结构化数据' },
                { id: 'metadata', label: '🏷️ 元数据' },
                { id: 'apicalls', label: '📡 接口数据' },
                { id: 'business', label: '💰 商业数据' },
                { id: 'raw', label: '📜 原始数据' }
            ];
            var nav = document.getElementById('tabNav');
            var content = document.getElementById('tabContent');
            nav.innerHTML = tabs.map(function(t){
                return '<button class="tab-btn'+(t.active?' active':'')+'" onclick="switchTab(\''+t.id+'\',this)">'+t.label+'</button>';
            }).join('');
            content.innerHTML = tabs.map(function(t){
                return '<div class="tab-pane'+(t.active?' active':'')+'" id="tab-'+t.id+'"></div>';
            }).join('');
            renderOverview(data);
            renderText(data);
            renderLinks(data);
            renderMedia(data);
            renderStructured(data);
            renderMetadata(data);
            renderAPICalls(data);
            renderBusiness(data);
            renderRaw(data);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
            document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
            if (btn) btn.classList.add('active');
            var pane = document.getElementById('tab-' + id);
            if (pane) pane.classList.add('active');
        }

        /* ============================================
           Helper: formatBytes
           ============================================ */
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            var k = 1024, sizes = ['B','KB','MB','GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        /* ============================================
           Tab: Overview
           ============================================ */
        function renderOverview(data) {
            var pane = document.getElementById('tab-overview');
            var pages = data.pages || [];
            var h = '<div class="section-title">爬取概览</div>';
            var cs = data.crawl_stats || {};
            if (cs.total_pages != null || cs.duration_seconds != null) {
                h += '<div class="stats-bar">';
                if (cs.total_pages != null) h += '<div class="stats-bar-item">📄 页面: <span class="stats-val">' + cs.total_pages + '</span></div>';
                if (cs.total_bytes != null) h += '<div class="stats-bar-item">💾 大小: <span class="stats-val">' + formatBytes(cs.total_bytes) + '</span></div>';
                if (cs.duration_seconds != null) h += '<div class="stats-bar-item">⏱️ 耗时: <span class="stats-val">' + cs.duration_seconds.toFixed(1) + 's</span></div>';
                if (cs.pages_per_second != null) h += '<div class="stats-bar-item">🚀 速度: <span class="stats-val">' + cs.pages_per_second.toFixed(2) + ' 页/秒</span></div>';
                if (cs.urls_discovered != null) h += '<div class="stats-bar-item">🔍 发现: <span class="stats-val">' + cs.urls_discovered + ' 个URL</span></div>';
                h += '</div>';
            }
            pages.forEach(function(p,i){
                var ext = p.extracted || {};
                h += '<div class="glass" style="padding:18px;margin-bottom:14px;">';
                h += '<div style="font-weight:600;margin-bottom:8px;">📄 Page '+(i+1)+': '+escapeHTML(p.title||'无标题')+'</div>';
                h += '<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px;">URL: <a href="'+escapeHTML(p.url)+'" target="_blank" style="color:var(--accent-light);text-decoration:none;">'+escapeHTML(p.url)+'</a> &nbsp;|&nbsp; Status: <span style="color:'+(p.status_code===200?'var(--success)':'var(--error)')+'">'+p.status_code+'</span></div>';
                h += '<div style="display:flex;gap:20px;flex-wrap:wrap;font-size:0.85rem;color:var(--text-secondary);">';
                if (ext.text) h += '<span>📝 '+(ext.text.headings||[]).length+' 个标题</span>';
                if (ext.links) h += '<span>🔗 '+(ext.links.all_count||0)+' 个链接</span>';
                if (ext.media) h += '<span>🖼️ '+(ext.media.images||[]).length+' 张图片</span>';
                if (ext.structured) h += '<span>📊 '+(ext.structured.tables||[]).length+' 个表格</span>';
                if (ext.metadata && ext.metadata.description) h += '<span>🏷️ '+escapeHTML(ext.metadata.description).substring(0,80)+'...</span>';
                h += '</div></div>';
            });
            if (pages.length === 0) h += '<div class="empty-state"><div class="icon">📭</div><p>没有爬取到页面数据</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Text Content
           ============================================ */
        function renderText(data) {
            var pane = document.getElementById('tab-text');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var text = (p.extracted||{}).text;
                if (!text) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                if (text.headings && text.headings.length > 0) {
                    h += '<div class="section-subtitle">📑 标题 ('+text.headings.length+')</div><div class="text-content">';
                    text.headings.forEach(function(heading){ h += '<'+heading.level+'>'+escapeHTML(heading.text)+'</'+heading.level+'>'; });
                    h += '</div>';
                }
                if (text.main_content) {
                    h += '<div class="section-subtitle">📄 主要内容</div><div class="json-viewer" style="max-height:300px;">'+escapeHTML(text.main_content)+'</div>';
                }
                if (text.paragraphs && text.paragraphs.length > 0) {
                    h += '<div class="section-subtitle">📝 段落 ('+text.paragraphs.length+')</div><div class="text-content">';
                    text.paragraphs.slice(0,20).forEach(function(p2){ h += '<p>'+escapeHTML(p2)+'</p>'; });
                    if (text.paragraphs.length > 20) h += '<p style="color:var(--text-muted);">... 还有 '+(text.paragraphs.length-20)+' 个段落</p>';
                    h += '</div>';
                }
                if (text.lists && text.lists.length > 0) {
                    h += '<div class="section-subtitle">📋 列表 ('+text.lists.length+')</div>';
                    text.lists.forEach(function(list){
                        if (Array.isArray(list)) {
                            h += '<ul style="padding-left:20px;margin-bottom:10px;">';
                            list.forEach(function(item){ h += '<li style="color:var(--text-secondary);margin-bottom:4px;">'+escapeHTML(item)+'</li>'; });
                            h += '</ul>';
                        }
                    });
                }
                var shadowDom = (p.extracted||{}).shadow_dom;
                if (shadowDom && shadowDom.length > 0) {
                    h += '<div class="section-subtitle">🌑 Shadow DOM ('+shadowDom.length+')</div>';
                    shadowDom.forEach(function(sd){ h += '<div class="json-viewer" style="max-height:200px;">'+escapeHTML(sd.content||JSON.stringify(sd))+'</div>'; });
                }
            });
            if (!h) h = '<div class="empty-state"><div class="icon">📝</div><p>没有文本内容</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Links
           ============================================ */
        function renderLinks(data) {
            var pane = document.getElementById('tab-links');
            var pages = data.pages || [];
            var h = '<div class="section-title">链接</div>';
            h += '<div class="filter-bar"><button class="filter-btn active" onclick="filterLinks(\'all\',this)">全部</button><button class="filter-btn" onclick="filterLinks(\'internal\',this)">🟢 内部链接</button><button class="filter-btn" onclick="filterLinks(\'external\',this)">🔵 外部链接</button></div>';
            var allLinks = [];
            pages.forEach(function(p){
                var links = (p.extracted||{}).links;
                if (!links) return;
                (links.internal||[]).forEach(function(l){
                    var url = typeof l==='string'?l:l.url;
                    var text = typeof l==='string'?'':(l.text||'');
                    allLinks.push({url:url,text:text,type:'internal',page:p.url});
                });
                (links.external||[]).forEach(function(l){
                    var url = typeof l==='string'?l:l.url;
                    var text = typeof l==='string'?'':(l.text||'');
                    allLinks.push({url:url,text:text,type:'external',page:p.url});
                });
            });
            if (allLinks.length > 0) {
                h += '<div style="overflow-x:auto;"><table class="data-table" id="linksTable"><thead><tr><th>类型</th><th>URL</th><th>文本</th><th>来源页面</th></tr></thead><tbody>';
                allLinks.forEach(function(link){
                    h += '<tr data-type="'+link.type+'"><td><span class="badge badge-'+link.type+'">'+(link.type==='internal'?'内部':'外部')+'</span></td><td><a href="'+escapeHTML(link.url)+'" target="_blank">'+escapeHTML(link.url)+'</a></td><td>'+escapeHTML(link.text)+'</td><td style="font-size:0.78rem;color:var(--text-muted);">'+escapeHTML(link.page)+'</td></tr>';
                });
                h += '</tbody></table></div>';
            } else {
                h += '<div class="empty-state"><div class="icon">🔗</div><p>没有找到链接</p></div>';
            }
            var sitemapUrls = [];
            pages.forEach(function(p){ var l=(p.extracted||{}).links; if(l&&l.sitemap_urls) sitemapUrls=sitemapUrls.concat(l.sitemap_urls); });
            if (sitemapUrls.length > 0) {
                h += '<div class="section-subtitle">🗺️ Sitemap URLs ('+sitemapUrls.length+')</div><ul class="media-list">';
                sitemapUrls.forEach(function(u){ h += '<li>🗺️ '+escapeHTML(u)+'</li>'; });
                h += '</ul>';
            }
            var hiddenLinks = [];
            pages.forEach(function(p){ var l=(p.extracted||{}).links; if(l&&l.hidden_links) hiddenLinks=hiddenLinks.concat(l.hidden_links); });
            if (hiddenLinks.length > 0) {
                h += '<div class="section-subtitle">👁️ 隐藏链接 ('+hiddenLinks.length+')</div><ul class="media-list">';
                hiddenLinks.forEach(function(l){ var u=typeof l==='string'?l:l.url; h += '<li>👁️ '+escapeHTML(u)+'</li>'; });
                h += '</ul>';
            }
            pane.innerHTML = h;
        }

        function filterLinks(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
            if (btn) btn.classList.add('active');
            document.querySelectorAll('#linksTable tbody tr').forEach(function(row){
                row.style.display = (type==='all'||row.getAttribute('data-type')===type) ? '' : 'none';
            });
        }

        /* ============================================
           Tab: Media
           ============================================ */
        function renderMedia(data) {
            var pane = document.getElementById('tab-media');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var media = (p.extracted||{}).media;
                if (!media) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                if (media.images && media.images.length > 0) {
                    h += '<div class="section-subtitle">🖼️ 图片 ('+media.images.length+')</div><div class="media-grid">';
                    media.images.slice(0,20).forEach(function(img){
                        var src = typeof img==='string'?img:(img.url||img.src||'');
                        var alt = typeof img==='string'?'':(img.alt||'');
                        h += '<div class="media-item"><img src="'+escapeHTML(src)+'" alt="'+escapeHTML(alt)+'" onerror="this.style.display=\'none\'"><div class="media-label">'+escapeHTML(alt||src)+'</div></div>';
                    });
                    h += '</div>';
                }
                if (media.videos && media.videos.length > 0) {
                    h += '<div class="section-subtitle">🎬 视频 ('+media.videos.length+')</div><ul class="media-list">';
                    media.videos.forEach(function(v){ var s=typeof v==='string'?v:(v.url||v.src||''); h += '<li>🎬 '+escapeHTML(s)+'</li>'; });
                    h += '</ul>';
                }
                if (media.audio && media.audio.length > 0) {
                    h += '<div class="section-subtitle">🔊 音频 ('+media.audio.length+')</div><ul class="media-list">';
                    media.audio.forEach(function(a){ var s=typeof a==='string'?a:(a.url||a.src||''); h += '<li>🔊 '+escapeHTML(s)+'</li>'; });
                    h += '</ul>';
                }
                if (media.documents && media.documents.length > 0) {
                    h += '<div class="section-subtitle">📎 文档 ('+media.documents.length+')</div><ul class="media-list">';
                    media.documents.forEach(function(d){ var s=typeof d==='string'?d:(d.url||d.src||''); h += '<li>📎 '+escapeHTML(s)+'</li>'; });
                    h += '</ul>';
                }
            });
            var hasIframe = false;
            pages.forEach(function(p){ var iframes=(p.extracted||{}).iframe_content; if(iframes&&iframes.length>0) hasIframe=true; });
            if (hasIframe) {
                h += '<div class="section-subtitle">🖼️ iframe 内容</div>';
                pages.forEach(function(p){
                    var iframes = (p.extracted||{}).iframe_content || [];
                    iframes.forEach(function(iframe){
                        h += '<div class="glass" style="padding:14px;margin-bottom:10px;">';
                        h += '<div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">SRC: <a href="'+escapeHTML(iframe.src||'')+'" target="_blank" style="color:var(--accent-light);text-decoration:none;">'+escapeHTML(iframe.src||'')+'</a>';
                        if (iframe.title) h += ' &nbsp;|&nbsp; Title: '+escapeHTML(iframe.title);
                        h += '</div>';
                        if (iframe.content) h += '<div class="json-viewer" style="max-height:150px;">'+escapeHTML(iframe.content).substring(0,2000)+'</div>';
                        h += '</div>';
                    });
                });
            }
            if (!h) h = '<div class="empty-state"><div class="icon">🖼️</div><p>没有媒体内容</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Structured Data
           ============================================ */
        function renderStructured(data) {
            var pane = document.getElementById('tab-structured');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var structured = (p.extracted||{}).structured;
                if (!structured) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                if (structured.tables && structured.tables.length > 0) {
                    h += '<div class="section-subtitle">📊 表格 ('+structured.tables.length+')</div>';
                    structured.tables.forEach(function(table){
                        h += '<div style="overflow-x:auto;margin-bottom:14px;"><table class="data-table">';
                        if (table.headers && table.headers.length > 0) {
                            h += '<thead><tr>';
                            table.headers.forEach(function(hdr){ h += '<th>'+escapeHTML(hdr)+'</th>'; });
                            h += '</tr></thead>';
                        }
                        if (table.rows && table.rows.length > 0) {
                            h += '<tbody>';
                            table.rows.slice(0,50).forEach(function(row){
                                h += '<tr>';
                                if (Array.isArray(row)) row.forEach(function(cell){ h += '<td>'+escapeHTML(cell)+'</td>'; });
                                h += '</tr>';
                            });
                            h += '</tbody>';
                        }
                        h += '</table></div>';
                    });
                }
                if (structured.json_ld && structured.json_ld.length > 0) {
                    h += '<div class="section-subtitle">🔗 JSON-LD ('+structured.json_ld.length+')</div>';
                    structured.json_ld.forEach(function(jld,ji){
                        h += '<div style="margin-bottom:10px;"><button class="copy-btn" onclick="copyJSON('+i+','+ji+')">📋 复制</button><div class="json-viewer">'+escapeHTML(JSON.stringify(jld,null,2))+'</div></div>';
                    });
                }
                if (structured.inline_json && structured.inline_json.length > 0) {
                    h += '<div class="section-subtitle">📋 内联 JSON ('+structured.inline_json.length+')</div>';
                    structured.inline_json.forEach(function(ij,ii){
                        h += '<div style="margin-bottom:10px;"><button class="copy-btn" onclick="copyInlineJSON('+i+','+ii+')">📋 复制</button><div class="json-viewer">'+escapeHTML(JSON.stringify(ij,null,2))+'</div></div>';
                    });
                }
            });
            if (!h) h = '<div class="empty-state"><div class="icon">📊</div><p>没有结构化数据</p></div>';
            pane.innerHTML = h;
        }

        function copyJSON(pi,ji) {
            if (currentData && currentData.pages && currentData.pages[pi]) {
                var s = currentData.pages[pi].extracted.structured;
                if (s && s.json_ld && s.json_ld[ji]) copyToClipboard(JSON.stringify(s.json_ld[ji],null,2));
            }
        }

        function copyInlineJSON(pi,ii) {
            if (currentData && currentData.pages && currentData.pages[pi]) {
                var s = currentData.pages[pi].extracted.structured;
                if (s && s.inline_json && s.inline_json[ii]) copyToClipboard(JSON.stringify(s.inline_json[ii],null,2));
            }
        }

        /* ============================================
           Tab: Metadata
           ============================================ */
        function renderMetadata(data) {
            var pane = document.getElementById('tab-metadata');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var meta = (p.extracted||{}).metadata;
                if (!meta) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                var fields = [
                    {key:'title',label:'标题'},{key:'description',label:'描述'},{key:'keywords',label:'关键词'},
                    {key:'author',label:'作者'},{key:'publish_date',label:'发布日期'}
                ];
                var hasAny = fields.some(function(f){return meta[f.key];});
                if (hasAny) {
                    h += '<div class="kv-grid">';
                    fields.forEach(function(f){
                        if (meta[f.key]) { h += '<div class="kv-key">'+f.label+'</div><div class="kv-value">'+escapeHTML(meta[f.key])+'</div>'; }
                    });
                    h += '</div>';
                }
                if (meta.open_graph && Object.keys(meta.open_graph).length > 0) {
                    h += '<div class="section-subtitle">🌐 Open Graph</div><div class="kv-grid">';
                    Object.keys(meta.open_graph).forEach(function(k){ h += '<div class="kv-key">'+escapeHTML(k)+'</div><div class="kv-value">'+escapeHTML(meta.open_graph[k])+'</div>'; });
                    h += '</div>';
                }
                if (meta.twitter_cards && Object.keys(meta.twitter_cards).length > 0) {
                    h += '<div class="section-subtitle">🐦 Twitter Cards</div><div class="kv-grid">';
                    Object.keys(meta.twitter_cards).forEach(function(k){ h += '<div class="kv-key">'+escapeHTML(k)+'</div><div class="kv-value">'+escapeHTML(meta.twitter_cards[k])+'</div>'; });
                    h += '</div>';
                }
            });
            var hasWS = false;
            pages.forEach(function(p){ var ws=(p.extracted||{}).websocket_frames; if(ws&&ws.length>0) hasWS=true; });
            if (hasWS) {
                h += '<div class="section-subtitle">🔌 WebSocket 帧</div>';
                pages.forEach(function(p){
                    var ws = (p.extracted||{}).websocket_frames || [];
                    if (ws.length > 0) {
                        h += '<div style="overflow-x:auto;margin-bottom:14px;"><table class="data-table"><thead><tr><th>类型</th><th>时间戳</th><th>数据</th></tr></thead><tbody>';
                        ws.slice(0,50).forEach(function(frame){
                            h += '<tr><td><span class="badge badge-get">'+escapeHTML(frame.type||'')+'</span></td><td style="font-family:var(--font-mono);font-size:0.8rem;">'+escapeHTML(frame.timestamp||'')+'</td><td style="font-family:var(--font-mono);font-size:0.8rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHTML(frame.data||'')+'</td></tr>';
                        });
                        h += '</tbody></table></div>';
                    }
                });
            }
            if (!h) h = '<div class="empty-state"><div class="icon">🏷️</div><p>没有元数据</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: API Calls
           ============================================ */
        function renderAPICalls(data) {
            var pane = document.getElementById('tab-apicalls');
            var pages = data.pages || [];
            var allCalls = [];
            pages.forEach(function(p){
                var calls = (p.extracted||{}).api_calls || [];
                calls.forEach(function(c){ allCalls.push(c); });
            });
            var h = '<div class="section-title">📡 捕获的 API 请求 ('+allCalls.length+')</div>';
            if (allCalls.length > 0) {
                h += '<div style="overflow-x:auto;"><table class="api-table"><thead><tr><th>方法</th><th>URL</th><th>状态</th><th>Content-Type</th><th>响应预览</th></tr></thead><tbody>';
                allCalls.forEach(function(call){
                    var method = (call.method||'GET').toUpperCase();
                    var bc = 'badge-other';
                    if (method==='GET') bc='badge-get'; else if (method==='POST') bc='badge-post'; else if (method==='PUT') bc='badge-put'; else if (method==='DELETE') bc='badge-delete';
                    h += '<tr><td><span class="badge '+bc+'">'+escapeHTML(method)+'</span></td><td style="word-break:break-all;"><a href="'+escapeHTML(call.url||'')+'" target="_blank">'+escapeHTML(call.url||'')+'</a></td><td>'+(call.status||'')+'</td><td style="font-size:0.8rem;">'+escapeHTML(call.content_type||'')+'</td><td style="max-width:300px;font-family:var(--font-mono);font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHTML((call.response_preview||'').substring(0,200))+'</td></tr>';
                });
                h += '</tbody></table></div>';
            } else {
                h += '<div class="empty-state"><div class="icon">📡</div><p>没有捕获到 API 请求</p></div>';
            }
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Business Data
           ============================================ */
        function renderBusiness(data) {
            var pane = document.getElementById('tab-business');
            var pages = data.pages || [];
            var h = '';
            pages.forEach(function(p,i){
                var biz = (p.extracted||{}).business;
                if (!biz) return;
                h += '<div class="section-title">Page '+(i+1)+': '+escapeHTML(p.title||p.url)+'</div>';
                var sections = [
                    {key:'prices',icon:'💰',label:'价格'},{key:'ratings',icon:'⭐',label:'评分'},
                    {key:'dates',icon:'📅',label:'日期'},{key:'locations',icon:'📍',label:'地点'}
                ];
                sections.forEach(function(s){
                    var items = biz[s.key];
                    if (items && items.length) {
                        h += '<div class="section-subtitle">'+s.icon+' '+s.label+' ('+items.length+')</div><ul class="media-list">';
                        items.forEach(function(item){
                            var display = typeof item==='object'?JSON.stringify(item):String(item);
                            h += '<li>'+s.icon+' '+escapeHTML(display)+'</li>';
                        });
                        h += '</ul>';
                    }
                });
            });
            if (!h) h = '<div class="empty-state"><div class="icon">💰</div><p>没有商业数据</p></div>';
            pane.innerHTML = h;
        }

        /* ============================================
           Tab: Raw JSON
           ============================================ */
        function renderRaw(data) {
            var pane = document.getElementById('tab-raw');
            var json = JSON.stringify(data, null, 2);
            var h = '<div class="section-title">原始 JSON 响应</div>';
            h += '<button class="copy-btn" style="margin-bottom:10px;" onclick="copyRawJSON()">📋 复制到剪贴板</button>';
            h += '<div class="json-viewer" id="rawJson">'+escapeHTML(json)+'</div>';
            pane.innerHTML = h;
        }

        function copyRawJSON() {
            if (currentData) copyToClipboard(JSON.stringify(currentData, null, 2));
        }

        /* ============================================
           Clipboard Helper
           ============================================ */
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function(){
                showToast('已复制到剪贴板！', 'success');
            }).catch(function(){
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('已复制到剪贴板！', 'success');
            });
        }

        /* ============================================
           Export: JSON
           ============================================ */
        function exportJSON() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
            downloadBlob(blob, 'scrape-results.json');
            showToast('JSON 已导出！', 'success');
        }

        /* ============================================
           Export: CSV
           ============================================ */
        function exportCSV() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var rows = [['URL','Title','Status','Type','Content']];
            (currentData.pages||[]).forEach(function(p){
                var ext = p.extracted || {};
                if (ext.links) {
                    (ext.links.internal||[]).forEach(function(u){ var url=typeof u==='string'?u:u.url; rows.push([p.url,p.title||'',p.status_code,'link-internal',url]); });
                    (ext.links.external||[]).forEach(function(u){ var url=typeof u==='string'?u:u.url; rows.push([p.url,p.title||'',p.status_code,'link-external',url]); });
                }
                if (ext.media && ext.media.images) {
                    ext.media.images.forEach(function(img){ var s=typeof img==='string'?img:(img.url||img.src||''); rows.push([p.url,p.title||'',p.status_code,'image',s]); });
                }
                if (ext.text && ext.text.main_content) rows.push([p.url,p.title||'',p.status_code,'text',ext.text.main_content.substring(0,500)]);
                if (ext.metadata) {
                    rows.push([p.url,p.title||'',p.status_code,'description',ext.metadata.description||'']);
                    rows.push([p.url,p.title||'',p.status_code,'keywords',ext.metadata.keywords||'']);
                }
            });
            var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
            var blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
            downloadBlob(blob, 'scrape-results.csv');
            showToast('CSV 已导出！', 'success');
        }

        /* ============================================
           Export: Excel
           ============================================ */
        function exportExcel() {
            if (!currentData) { showToast('没有数据可导出。', 'warning'); return; }
            var xml = '<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n';
            xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
            xml += '<Styles>\n<Style ss:ID="header"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#4F46E5" ss:Pattern="Solid"/></Style>\n';
            xml += '<Style ss:ID="cell"><Font ss:Color="#333333"/></Style>\n</Styles>\n';
            xml += '<Worksheet ss:Name="Scrape Results"><Table>\n<Row>';
            ['URL','Title','Status','Type','Content'].forEach(function(hdr){ xml += '<Cell ss:StyleID="header"><Data ss:Type="String">'+escapeXML(hdr)+'</Data></Cell>'; });
            xml += '</Row>\n';
            (currentData.pages||[]).forEach(function(p){
                var ext = p.extracted || {};
                if (ext.text && ext.text.main_content) {
                    xml += '<Row><Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.url)+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.title||'')+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="Number">'+p.status_code+'</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">text</Data></Cell>';
                    xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(ext.text.main_content.substring(0,500))+'</Data></Cell></Row>\n';
                }
                if (ext.links) {
                    [].concat(ext.links.internal||[],ext.links.external||[]).forEach(function(u){
                        var url=typeof u==='string'?u:u.url;
                        xml += '<Row><Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.url)+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(p.title||'')+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="Number">'+p.status_code+'</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">link</Data></Cell>';
                        xml += '<Cell ss:StyleID="cell"><Data ss:Type="String">'+escapeXML(url)+'</Data></Cell></Row>\n';
                    });
                }
            });
            xml += '</Table></Worksheet>\n</Workbook>';
            var blob = new Blob([xml], { type: 'application/vnd.ms-excel' });
            downloadBlob(blob, 'scrape-results.xls');
            showToast('Excel 已导出！', 'success');
        }

        function escapeXML(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ============================================
           Download Helper
           ============================================ */
        function downloadBlob(blob, filename) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /* ============================================
           Interaction Management
           ============================================ */
        function addInteraction() {
            var list = document.getElementById('interactionsList');
            var row = document.createElement('div');
            row.className = 'interaction-row';
            row.innerHTML = '<select onchange="toggleIntSelector(this)"><option value="scroll_to_bottom">滚动到底部</option><option value="click">点击元素</option><option value="wait">等待</option><option value="hover">悬停</option><option value="scroll_to">滚动到元素</option><option value="type_text">输入文本</option><option value="select_option">选择选项</option></select><input type="text" class="int-selector" placeholder="CSS 选择器（可选）"><input type="number" class="int-delay" value="500" min="0" max="30000" step="100" placeholder="延迟ms"><button class="btn-remove-action" onclick="removeInteraction(this)">✕</button>';
            list.appendChild(row);
        }

        function removeInteraction(btn) {
            var row = btn.closest('.interaction-row');
            if (row) row.remove();
        }

        function toggleIntSelector(sel) {
            var row = sel.closest('.interaction-row');
            var selectorInput = row.querySelector('.int-selector');
            var val = sel.value;
            if (val === 'scroll_to_bottom' || val === 'wait') {
                selectorInput.disabled = true;
                selectorInput.placeholder = '无需选择器';
            } else {
                selectorInput.disabled = false;
                selectorInput.placeholder = 'CSS 选择器';
            }
        }
    
    </script>

</body>
</html>
